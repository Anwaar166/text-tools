<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Convert text to uppercase, lowercase, capitalize words, remove extra spaces, and format text instantly with TextUtils.">
    <meta name="keywords"
        content="text utils, text converter, uppercase, lowercase, capitalize, remove spaces, text formatter">
    <meta name="author" content="Qazi Anwaar Ahmed">
    <meta name="theme-color" content="#6D4CFF">
    <title>TextUtils - Free Online Text Converter & Formatter</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="style.css">

    <!-- Open Graph -->
    <meta property="og:title" content="TextUtils - Free Online Text Converter">
    <meta property="og:description" content="A fast and free online tool for text formatting and conversion.">
    <meta property="og:type" content="website">
</head>

<body>
    <main>
        <div class="heading">
            <h1>TextUtils
            </h1>
        </div>
        <div class="container">
            <h2>Enter your text</h2>
            <textarea class="textarea" placeholder="Type or paste your text here..."></textarea>
            <div class="textAndDropdown">
                <select class="text-select">
                    <option value="">Select Action</option>
                    <option value="uppercase">UPPERCASE</option>
                    <option value="lowercase">lowercase</option>
                    <option value="capitalize">Capitalize</option>
                    <option value="remove-spaces">Remove Spaces</option>
                    <option value="copy-text">Copy Text</option>
                    <option value="clear-text">Clear Text</option>
                    <option value="word-count">Word Count</option>
                    <option value="char-count">Character Count</option>
                </select>
                                <button id="btn">UPPERCASE</button>

            </div>
        </div>
    </main>
    <script src="script.js"></script>

</body>

</html>
